<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriTrack — Daily Nutrition Tracker</title>
<style>
  :root{
    --bg: #121317;
    --surface: #1c1e24;
    --surface-2: #24272f;
    --surface-3: #2c2f39;
    --on-surface: #e7e6ea;
    --on-surface-variant: #a7a9b4;
    --outline: #3a3d47;

    --calories: #ffb648;
    --protein: #7fd8a0;
    --carbs: #7db9ff;
    --fats: #f38fb0;

    --primary: #b9c3ff;
    --on-primary: #1a2264;
    --danger: #ff8a80;

    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;

    --ease: cubic-bezier(0.2, 0, 0, 1);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--on-surface);
    font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    overscroll-behavior-y: none;
  }

  body{
    display:flex;
    justify-content:center;
    min-height: 100vh;
  }

  .app{
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 20px 16px 40px;
    position: relative;
  }

  header.top{
    padding: 8px 4px 20px;
  }
  header.top h1{
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.2px;
  }
  header.top p{
    margin: 4px 0 0;
    color: var(--on-surface-variant);
    font-size: 13px;
  }

  /* ---------- Dashboard Card ---------- */
  .dashboard{
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    transition: box-shadow 0.3s var(--ease);
  }

  .ring-wrap{
    position: relative;
    width: 200px;
    height: 200px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .ring-wrap svg{
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg{
    fill: none;
    stroke: var(--surface-3);
    stroke-width: 12;
  }

  .ring-fg{
    fill: none;
    stroke: var(--calories);
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s var(--ease), stroke 0.4s var(--ease);
  }

  .ring-center{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .ring-center .value{
    font-size: 34px;
    font-weight: 800;
    line-height: 1;
    transition: color 0.3s var(--ease);
    font-variant-numeric: tabular-nums;
  }
  .ring-center .of{
    font-size: 12px;
    color: var(--on-surface-variant);
    margin-top: 6px;
  }
  .ring-center .rem{
    font-size: 11px;
    margin-top: 4px;
    padding: 2px 10px;
    border-radius: 20px;
    background: var(--surface-3);
    color: var(--on-surface-variant);
    transition: background 0.3s var(--ease), color 0.3s var(--ease);
  }
  .ring-center .rem.over{
    background: rgba(255,138,128,0.15);
    color: var(--danger);
  }

  .macro-row{
    width:100%;
    display:flex;
    gap: 10px;
  }

  .macro-card{
    flex:1;
    background: var(--surface-2);
    border-radius: var(--radius-md);
    padding: 12px 10px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 8px;
    transition: transform 0.2s var(--ease);
  }

  .macro-label{
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--on-surface-variant);
  }

  .macro-bar-track{
    width: 100%;
    height: 8px;
    border-radius: 8px;
    background: var(--surface-3);
    overflow: hidden;
  }

  .macro-bar-fill{
    height: 100%;
    border-radius: 8px;
    width: 0%;
    transition: width 0.7s var(--ease), background 0.3s var(--ease);
  }

  .macro-num{
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .macro-num span{
    font-weight: 400;
    color: var(--on-surface-variant);
    font-size: 11px;
  }

  .macro-card.protein .macro-bar-fill{ background: var(--protein); }
  .macro-card.carbs .macro-bar-fill{ background: var(--carbs); }
  .macro-card.fats .macro-bar-fill{ background: var(--fats); }

  /* ---------- Section headers ---------- */
  .section-title{
    margin: 28px 4px 12px;
    font-size: 15px;
    font-weight: 700;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-title .badge{
    font-size: 11px;
    font-weight: 600;
    color: var(--on-surface-variant);
    background: var(--surface-2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ---------- Quick Add Form ---------- */
  .form-card{
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }

  .field{
    position: relative;
    margin-bottom: 22px;
  }
  .field input{
    width: 100%;
    padding: 16px 14px 8px;
    background: var(--surface-2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--on-surface);
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s var(--ease), background 0.25s var(--ease);
    -moz-appearance: textfield;
  }
  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button{
    -webkit-appearance: none;
    margin: 0;
  }
  .field input:focus{
    border-color: var(--primary);
    background: var(--surface-3);
  }
  .field label{
    position: absolute;
    left: 14px;
    top: 16px;
    font-size: 15px;
    color: var(--on-surface-variant);
    pointer-events: none;
    transform-origin: left top;
    transition: transform 0.22s var(--ease), color 0.22s var(--ease), top 0.22s var(--ease);
  }
  .field input:focus + label,
  .field input.filled + label{
    top: 6px;
    transform: scale(0.72);
    color: var(--primary);
  }

  .field-row{
    display:flex;
    gap: 10px;
  }
  .field-row .field{
    flex:1;
  }

  .macro-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
  }

  button{
    font-family: inherit;
    cursor:pointer;
    border:none;
  }

  .btn-add{
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-sm);
    background: var(--primary);
    color: var(--on-primary);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: transform 0.15s var(--ease), box-shadow 0.2s var(--ease), opacity 0.2s;
    box-shadow: 0 4px 14px rgba(185,195,255,0.25);
  }
  .btn-add:active{
    transform: scale(0.96);
    box-shadow: 0 2px 6px rgba(185,195,255,0.2);
  }
  .btn-add:disabled{
    opacity: 0.4;
    box-shadow: none;
  }

  /* ---------- History List ---------- */
  .history-list{
    display:flex;
    flex-direction:column;
    gap: 10px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .history-empty{
    text-align:center;
    color: var(--on-surface-variant);
    font-size: 13px;
    padding: 36px 10px;
    background: var(--surface);
    border-radius: var(--radius-md);
    border: 1.5px dashed var(--outline);
  }

  .item{
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 14px 14px;
    display:flex;
    align-items:center;
    gap: 12px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.22);
    animation: slideIn 0.4s var(--ease);
    transition: transform 0.3s var(--ease), opacity 0.3s var(--ease), max-height 0.35s var(--ease), margin 0.35s var(--ease), padding 0.35s var(--ease);
    overflow: hidden;
  }

  .item.removing{
    transform: translateX(110%);
    opacity: 0;
    max-height: 0;
    padding-top:0;
    padding-bottom:0;
    margin-bottom: -10px;
    border: none;
  }

  @keyframes slideIn{
    from{ opacity:0; transform: translateY(14px) scale(0.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .item-icon{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--surface-3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .item-body{
    flex: 1;
    min-width: 0;
  }
  .item-name{
    font-size: 14.5px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-macros{
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--on-surface-variant);
    display:flex;
    gap: 10px;
  }
  .item-macros span{ white-space: nowrap; }

  .item-cal{
    font-size: 15px;
    font-weight: 800;
    color: var(--calories);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .item-cal small{
    display:block;
    font-size: 9.5px;
    font-weight: 500;
    color: var(--on-surface-variant);
    text-align: right;
  }

  .btn-del{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--on-surface-variant);
    font-size: 16px;
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.15s var(--ease), background 0.2s var(--ease), color 0.2s var(--ease);
  }
  .btn-del:active{
    transform: scale(0.85);
    background: rgba(255,138,128,0.18);
    color: var(--danger);
  }

  /* ---------- Target editor ---------- */
  .target-edit{
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--surface-2);
    border-radius: 20px;
    padding: 6px 6px 6px 14px;
    font-size: 12px;
    color: var(--on-surface-variant);
  }
  .target-edit input{
    width: 60px;
    background: transparent;
    border: none;
    color: var(--on-surface);
    font-size: 13px;
    font-weight: 700;
    outline: none;
    text-align: right;
  }
  .target-edit button{
    background: var(--surface-3);
    color: var(--on-surface);
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 11.5px;
    font-weight: 700;
    transition: transform 0.15s var(--ease);
  }
  .target-edit button:active{ transform: scale(0.92); }

  ::-webkit-scrollbar{ width: 6px; }
  ::-webkit-scrollbar-thumb{ background: var(--surface-3); border-radius: 6px; }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-3);
    color: var(--on-surface);
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <h1>NutriTrack</h1>
    <p id="dateLabel">Today</p>
  </header>

  <!-- Dashboard -->
  <section class="dashboard">
    <div class="ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="86"></circle>
        <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="86"
                stroke-dasharray="540.4" stroke-dashoffset="540.4"></circle>
      </svg>
      <div class="ring-center">
        <div class="value" id="calValue">0</div>
        <div class="of">of <span id="calTargetLabel">2000</span> kcal</div>
        <div class="rem" id="remBadge">0 left</div>
      </div>
    </div>

    <div class="target-edit">
      <span>Daily target</span>
      <input type="number" id="targetInput" value="2000" min="500" step="50">
      <button id="saveTargetBtn">Set</button>
    </div>

    <div class="macro-row">
      <div class="macro-card protein">
        <div class="macro-label"><span class="macro-dot" style="background:var(--protein)"></span>Protein</div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="proteinBar"></div></div>
        <div class="macro-num"><span id="proteinVal">0</span>g <span>/ <span id="proteinTarget">120</span>g</span></div>
      </div>
      <div class="macro-card carbs">
        <div class="macro-label"><span class="macro-dot" style="background:var(--carbs)"></span>Carbs</div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="carbsBar"></div></div>
        <div class="macro-num"><span id="carbsVal">0</span>g <span>/ <span id="carbsTarget">250</span>g</span></div>
      </div>
      <div class="macro-card fats">
        <div class="macro-label"><span class="macro-dot" style="background:var(--fats)"></span>Fats</div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="fatsBar"></div></div>
        <div class="macro-num"><span id="fatsVal">0</span>g <span>/ <span id="fatsTarget">65</span>g</span></div>
      </div>
    </div>
  </section>

  <!-- Quick Add Form -->
  <div class="section-title">Quick Add</div>
  <form class="form-card" id="addForm">
    <div class="field">
      <input type="text" id="foodName" autocomplete="off" required>
      <label for="foodName">Food name</label>
    </div>

    <div class="field-row">
      <div class="field">
        <input type="number" id="foodCal" min="0" step="1" autocomplete="off" required>
        <label for="foodCal">Calories</label>
      </div>
      <div class="field">
        <input type="number" id="foodProtein" min="0" step="0.1" autocomplete="off">
        <label for="foodProtein">Protein (g)</label>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <input type="number" id="foodCarbs" min="0" step="0.1" autocomplete="off">
        <label for="foodCarbs">Carbs (g)</label>
      </div>
      <div class="field">
        <input type="number" id="foodFats" min="0" step="0.1" autocomplete="off">
        <label for="foodFats">Fats (g)</label>
      </div>
    </div>

    <button type="submit" class="btn-add" id="addBtn">Add Food</button>
  </form>

  <!-- History -->
  <div class="section-title">
    Today's Log
    <span class="badge" id="itemCount">0 items</span>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="emptyState">No food logged yet — add your first item above.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "nutritrack_data_v1";
  var CIRCUMFERENCE = 2 * Math.PI * 86;

  var state = {
    target: { calories: 2000, protein: 120, carbs: 250, fats: 65 },
    items: [] // {id, name, calories, protein, carbs, fats, time}
  };

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      var parsed = JSON.parse(raw);
      var today = new Date().toDateString();
      if(parsed.day !== today){
        // new day: keep target, reset items
        state.target = parsed.target || state.target;
        state.items = [];
        persist();
        return;
      }
      state.target = parsed.target || state.target;
      state.items = parsed.items || [];
    } catch(e){ /* ignore corrupt storage */ }
  }

  function persist(){
    var payload = {
      day: new Date().toDateString(),
      target: state.target,
      items: state.items
    };
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch(e){}
  }

  // ---------- DOM refs ----------
  var $ = function(id){ return document.getElementById(id); };
  var ringFg = $("ringFg");
  var calValue = $("calValue");
  var calTargetLabel = $("calTargetLabel");
  var remBadge = $("remBadge");
  var targetInput = $("targetInput");
  var saveTargetBtn = $("saveTargetBtn");

  var proteinBar = $("proteinBar"), proteinVal = $("proteinVal"), proteinTarget = $("proteinTarget");
  var carbsBar = $("carbsBar"), carbsVal = $("carbsVal"), carbsTarget = $("carbsTarget");
  var fatsBar = $("fatsBar"), fatsVal = $("fatsVal"), fatsTarget = $("fatsTarget");

  var addForm = $("addForm");
  var foodName = $("foodName");
  var foodCal = $("foodCal");
  var foodProtein = $("foodProtein");
  var foodCarbs = $("foodCarbs");
  var foodFats = $("foodFats");

  var historyList = $("historyList");
  var emptyState = $("emptyState");
  var itemCount = $("itemCount");
  var toast = $("toast");
  var dateLabel = $("dateLabel");

  function fmtDate(){
    var d = new Date();
    var opts = { weekday: 'long', month: 'long', day: 'numeric' };
    return d.toLocaleDateString(undefined, opts);
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){
      toast.classList.remove("show");
    }, 1800);
  }

  function totals(){
    return state.items.reduce(function(acc, it){
      acc.calories += Number(it.calories) || 0;
      acc.protein += Number(it.protein) || 0;
      acc.carbs += Number(it.carbs) || 0;
      acc.fats += Number(it.fats) || 0;
      return acc;
    }, { calories:0, protein:0, carbs:0, fats:0 });
  }

  function renderDashboard(){
    var t = totals();
    var target = state.target;

    calTargetLabel.textContent = target.calories;
    targetInput.value = target.calories;
    proteinTarget.textContent = target.protein;
    carbsTarget.textContent = target.carbs;
    fatsTarget.textContent = target.fats;

    // animate calorie number count-up
    animateNumber(calValue, Number(calValue.textContent) || 0, Math.round(t.calories));

    var pct = Math.min(t.calories / target.calories, 1);
    var offset = CIRCUMFERENCE * (1 - pct);
    ringFg.style.strokeDashoffset = offset;

    var remaining = target.calories - t.calories;
    if(remaining >= 0){
      remBadge.textContent = Math.round(remaining) + " left";
      remBadge.classList.remove("over");
      ringFg.style.stroke = "var(--calories)";
    } else {
      remBadge.textContent = Math.round(Math.abs(remaining)) + " over";
      remBadge.classList.add("over");
      ringFg.style.stroke = "var(--danger)";
    }

    setMacroBar(proteinBar, proteinVal, t.protein, target.protein);
    setMacroBar(carbsBar, carbsVal, t.carbs, target.carbs);
    setMacroBar(fatsBar, fatsVal, t.fats, target.fats);
  }

  function setMacroBar(barEl, valEl, current, target){
    var pct = target > 0 ? Math.min((current / target) * 100, 100) : 0;
    barEl.style.width = pct + "%";
    valEl.textContent = Math.round(current * 10) / 10;
  }

  function animateNumber(el, from, to){
    if(from === to){ el.textContent = to; return; }
    var duration = 500;
    var startTime = null;
    function step(ts){
      if(!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.round(from + (to - from) * eased);
      el.textContent = current;
      if(progress < 1){
        requestAnimationFrame(step);
      } else {
        el.textContent = to;
      }
    }
    requestAnimationFrame(step);
  }

  function itemIcon(name){
    var trimmed = (name || "?").trim();
    return trimmed.charAt(0).toUpperCase() || "?";
  }

  function renderHistory(){
    itemCount.textContent = state.items.length + (state.items.length === 1 ? " item" : " items");

    if(state.items.length === 0){
      if(!$("emptyState")){
        historyList.innerHTML = '<div class="history-empty" id="emptyState">No food logged yet — add your first item above.</div>';
      }
      return;
    }

    var existingEmpty = $("emptyState");
    if(existingEmpty) existingEmpty.remove();

    // Remove DOM nodes for items no longer in state (already handled by delete flow)
    // Full re-render is simplest & safe here since dataset is small
    var existingIds = Array.prototype.map.call(historyList.querySelectorAll(".item"), function(n){ return n.dataset.id; });
    var stateIds = state.items.map(function(it){ return String(it.id); });

    // Add new items that don't exist in DOM yet
    state.items.forEach(function(it){
      var node = historyList.querySelector('.item[data-id="' + it.id + '"]');
      if(!node){
        var el = buildItemNode(it);
        historyList.insertBefore(el, historyList.firstChild);
      }
    });
  }

  function buildItemNode(it){
    var el = document.createElement("div");
    el.className = "item";
    el.dataset.id = it.id;

    el.innerHTML =
      '<div class="item-icon">' + itemIcon(it.name) + '</div>' +
      '<div class="item-body">' +
        '<div class="item-name"></div>' +
        '<div class="item-macros">' +
          '<span>P ' + roundNum(it.protein) + 'g</span>' +
          '<span>C ' + roundNum(it.carbs) + 'g</span>' +
          '<span>F ' + roundNum(it.fats) + 'g</span>' +
        '</div>' +
      '</div>' +
      '<div class="item-cal">' + Math.round(it.calories) + '<small>kcal</small></div>' +
      '<button class="btn-del" aria-label="Delete item">✕</button>';

    el.querySelector(".item-name").textContent = it.name;

    var delBtn = el.querySelector(".btn-del");
    delBtn.addEventListener("click", function(){
      deleteItem(it.id, el);
    });

    return el;
  }

  function roundNum(n){
    n = Number(n) || 0;
    return Math.round(n * 10) / 10;
  }

  function addItem(data){
    var item = {
      id: Date.now() + "_" + Math.random().toString(36).slice(2, 8),
      name: data.name,
      calories: data.calories,
      protein: data.protein,
      carbs: data.carbs,
      fats: data.fats,
      time: new Date().toISOString()
    };
    state.items.unshift(item);
    persist();
    renderHistory();
    renderDashboard();
    showToast(item.name + " added");
  }

  function deleteItem(id, node){
    node.classList.add("removing");
    node.addEventListener("transitionend", function handler(){
      node.removeEventListener("transitionend", handler);
      node.remove();
      state.items = state.items.filter(function(it){ return it.id !== id; });
      persist();
      renderHistory();
      renderDashboard();
    });
    // fallback in case transitionend doesn't fire
    setTimeout(function(){
      if(node.parentNode){
        node.remove();
        state.items = state.items.filter(function(it){ return it.id !== id; });
        persist();
        renderHistory();
        renderDashboard();
      }
    }, 500);
  }

  // ---------- Floating label filled-state handling ----------
  function initFloatingLabels(){
    var inputs = document.querySelectorAll(".field input");
    inputs.forEach(function(inp){
      var sync = function(){
        if(inp.value && inp.value.length > 0){
          inp.classList.add("filled");
        } else {
          inp.classList.remove("filled");
        }
      };
      inp.addEventListener("input", sync);
      inp.addEventListener("blur", sync);
      sync();
    });
  }

  // ---------- Form submit ----------
  addForm.addEventListener("submit", function(e){
    e.preventDefault();

    var name = foodName.value.trim();
    var cal = parseFloat(foodCal.value);
    var protein = parseFloat(foodProtein.value) || 0;
    var carbs = parseFloat(foodCarbs.value) || 0;
    var fats = parseFloat(foodFats.value) || 0;

    if(!name || isNaN(cal) || cal < 0){
      showToast("Enter a food name and calories");
      return;
    }

    addItem({ name: name, calories: cal, protein: protein, carbs: carbs, fats: fats });

    addForm.reset();
    document.querySelectorAll(".field input").forEach(function(inp){
      inp.classList.remove("filled");
    });
    foodName.focus();
  });

  saveTargetBtn.addEventListener("click", function(){
    var val = parseFloat(targetInput.value);
    if(isNaN(val) || val < 100){
      showToast("Enter a valid target");
      return;
    }
    state.target.calories = Math.round(val);
    persist();
    renderDashboard();
    showToast("Daily target updated");
  });

  // ---------- Init ----------
  function init(){
    loadState();
    dateLabel.textContent = fmtDate();
    initFloatingLabels();
    renderHistory();
    // set initial ring state without count-up animation jump
    calValue.textContent = "0";
    renderDashboard();
  }

  init();
})();
</script>
</body>
</html>
